<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Filmes</title>
    <script src="MiniProjetoArrays.js" defer></script>
    <link rel="stylesheet" href="MiniProjetoArrays.css">
</head>

<body>
    <div id="lista-filmes">
        <h1>Lista de Filmes!</h1>
        <ul id="filmes"></ul>
    </div>
    <div id="busca">
        <input type="text" class="busca-container" id="inputGenero" placeholder="Qual é o género do filme que procura?">
        <button onclick="buscarFilmes()">Buscar Filmes</button>
    </div>
    <div id="buscatitle">
        <label for="selectFilmes">Selecione o filme desejado:</label>
        <select id="selectFilmes" onchange="buscarTitulo()">
            <option value="">-- Selecione um filme --</option>
        </select>

        <div id="add-movie-box" class="add-movie-form">
            <h2>Adicionar Novo Filme</h2>
            <div class="inputs-group">
                <input type="text" id="novoNome" placeholder="Título">
                <input type="text" id="novoGenero" placeholder="Género">
                <input type="text" id="novoLink" placeholder="Link da Imagem">
                <button
                    onclick="adicionarFilme(document.getElementById('novoNome').value,2024,document.getElementById('novoGenero').value,document.getElementById('novoLink').value)">Adicionar</button>
            </div>
        </div>

        <button id="btnRemover" onclick="removerFilme(document.getElementById('selectFilmes').value)"> Remover Filme
            Selecionado </button>


</body>

</html>
